app = "efb-connector"
primary_region = "fra"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.http_options]
    idle_timeout = 300

[mounts]
  source = "efb_data"
  destination = "/data"

[metrics]
  port = 9091
  path = "/metrics"

[env]
  PORT = "8080"
  DB_PATH = "/data/efb-connector.db"

# Memory is sized for the python3 garminconnect subprocess, NOT the Go server.
# Root cause confirmed 2026-06-30 from Fly Prometheus history (see the
# nightly-sync-oom-debug memory note): the Go process stays flat at ~25-54 MB
# RSS all week, but a single `python3 garmin_fetch.py` GPX download buffers the
# whole file in RAM and has spiked to ~413 MB of (unreclaimable, swap=0)
# anonymous memory for high-data users. That is invisible to
# process_resident_memory_bytes (Go-only) and shows up as fly_instance_memory_inactive.
# 256 MB (usable ~207 MB) cannot hold that peak -> confirmed OOM kill on 06-25.
# 512 MB (usable ~459 MB) holds it but with only ~46 MB headroom, so it is
# correct-but-marginal: the daily-sync workflow alerts if headroom runs low or
# an OOM recurs. Reverting to 256 MB would require bounding the python child's
# RAM (RLIMIT_DATA / streaming the GPX) first. Scale-to-zero is intentional.
[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
