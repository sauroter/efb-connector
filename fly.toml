app = "efb-connector"
primary_region = "fra"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.http_options]
    idle_timeout = 300

[mounts]
  source = "efb_data"
  destination = "/data"

[metrics]
  port = 9091
  path = "/metrics"

[env]
  PORT = "8080"
  DB_PATH = "/data/efb-connector.db"

# The nightly run-all spawns a python3 garminconnect subprocess per user on top
# of the Go server. The 256 MB default was OOM-killing the machine mid-run
# (fresh-process restart zeroed the in-memory run state, silently abandoning the
# unprocessed users). 512 MB gives that peak (Go + one python3) comfortable
# headroom. Scale-to-zero (min_machines_running=0) is intentionally kept.
[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
