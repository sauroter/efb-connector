app = "efb-connector"
primary_region = "fra"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.http_options]
    idle_timeout = "5m"

[mounts]
  source = "efb_data"
  destination = "/data"

[metrics]
  port = 9091
  path = "/metrics"

[env]
  PORT = "8080"
  DB_PATH = "/data/efb-connector.db"
