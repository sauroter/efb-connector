name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - run: go mod download
      - run: go vet ./...
      - run: go test ./...

  build:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - run: go build -o efb-connector ./cmd/server

      - name: Build Docker image (no push)
        run: docker build -t efb-connector:test .
