name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master]

jobs:
  quality:
    uses: ./.github/workflows/_quality.yml

  build:
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - run: go build -o efb-connector ./cmd/server

      - name: Build Docker image (no push)
        run: docker build -t efb-connector:test .
