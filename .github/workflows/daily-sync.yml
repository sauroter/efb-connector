name: Daily Sync

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger daily sync
        run: |
          set -euo pipefail

          BASE="${{ secrets.BASE_URL }}"
          AUTH="Authorization: Bearer ${{ secrets.INTERNAL_SECRET }}"

          # Kick off the fire-and-forget run. 202 = started, 409 = already running.
          KICKOFF_HTTP=$(curl -sS -o /tmp/kickoff.json -w '%{http_code}' \
            -X POST -H "$AUTH" "$BASE/internal/sync/run-all")
          echo "kickoff HTTP $KICKOFF_HTTP"
          cat /tmp/kickoff.json
          echo
          if [ "$KICKOFF_HTTP" != "202" ] && [ "$KICKOFF_HTTP" != "409" ]; then
            echo "::error::Unexpected kickoff status $KICKOFF_HTTP"
            exit 1
          fi

          # Poll status every 30s. The poll cadence doubles as a keep-alive
          # for the Fly machine (idle_timeout = 300s) and as a watchdog: if
          # the goroutine restarts (e.g. server crashed mid-run), we'll see
          # started_at change and surface that as a failure.
          DEADLINE=$(( $(date +%s) + 1800 ))   # 30 min cap, matches server timeout
          STATUS=""
          STARTED_AT_FIRST=""
          while [ "$(date +%s)" -lt "$DEADLINE" ]; do
            sleep 30
            STATUS=$(curl -fsS -H "$AUTH" "$BASE/internal/sync/run-all/status")
            echo "$STATUS"

            STARTED_AT=$(echo "$STATUS" | jq -r '.started_at // empty')
            if [ -z "$STARTED_AT_FIRST" ] && [ -n "$STARTED_AT" ]; then
              STARTED_AT_FIRST="$STARTED_AT"
            fi
            if [ -n "$STARTED_AT_FIRST" ] && [ -n "$STARTED_AT" ] && [ "$STARTED_AT" != "$STARTED_AT_FIRST" ]; then
              echo "::error::Run started_at changed mid-poll ($STARTED_AT_FIRST -> $STARTED_AT) — server likely restarted"
              exit 1
            fi

            IN_PROG=$(echo "$STATUS" | jq -r '.in_progress')
            if [ "$IN_PROG" = "false" ]; then
              break
            fi
          done

          if [ -z "$STATUS" ]; then
            echo "::error::Status was never read"
            exit 1
          fi

          ERR=$(echo "$STATUS" | jq -r '.error // empty')
          if [ -n "$ERR" ]; then
            echo "::error::Sync failed: $ERR"
            exit 1
          fi

          TOTAL=$(echo "$STATUS" | jq -r '.total_users')
          DONE=$(echo "$STATUS" | jq -r '.synced + .failed')
          if [ "$DONE" -lt "$TOTAL" ]; then
            echo "::error::Only $DONE of $TOTAL syncable users were processed"
            exit 1
          fi

          echo "Sync complete: $DONE of $TOTAL users processed."
