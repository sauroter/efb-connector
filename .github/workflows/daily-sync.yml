name: Daily Sync

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger daily sync
        run: |
          set -euo pipefail

          BASE="${{ secrets.BASE_URL }}"
          AUTH="Authorization: Bearer ${{ secrets.INTERNAL_SECRET }}"

          DEADLINE=$(( $(date +%s) + 10800 ))   # 180 min overall cap, matches server runAllTimeout
          MAX_KICKS=10                           # re-kicks allowed after a mid-run server restart
          KICKS=0

          # kick starts a run. 202 = started, 409 = already running. Any other
          # status is fatal.
          kick() {
            local http
            http=$(curl -sS -o /tmp/kickoff.json -w '%{http_code}' \
              -X POST -H "$AUTH" "$BASE/internal/sync/run-all" || echo "000")
            echo "kickoff HTTP $http"
            cat /tmp/kickoff.json 2>/dev/null || true
            echo
            if [ "$http" != "202" ] && [ "$http" != "409" ]; then
              echo "::error::Unexpected kickoff status $http"
              exit 1
            fi
            KICKS=$((KICKS + 1))
          }

          kick

          # Poll status every 30s. The poll cadence doubles as a keep-alive for
          # the Fly machine (idle_timeout = 300s).
          #
          # Completion contract: a genuinely finished run sets finished_at
          # (always written when the run goroutine returns) and reports
          # synced + failed >= total_users. The run state is held in process
          # memory only, so if the server restarts mid-run the goroutine dies
          # and the state resets to {in_progress:false, total_users:0,
          # synced:0} with NO finished_at. finished_at is therefore the
          # discriminator: present = the run actually completed (even an empty
          # run that skipped everyone already done this cycle); absent = the
          # process was killed mid-run. We must NOT read the zeroed state as
          # "0 of 0 = success" (which silently abandoned the unprocessed tail
          # of users). Instead we treat it as a transient failure and re-kick —
          # users already completed this cycle are skipped, so re-runs converge.
          while [ "$(date +%s)" -lt "$DEADLINE" ]; do
            sleep 30

            # --max-time caps each poll so a suspended/unreachable machine fails
            # fast and we re-loop, instead of one curl hanging silently. || true
            # keeps set -e from aborting on a transient blip.
            STATUS=$(curl -fsS --max-time 60 -H "$AUTH" "$BASE/internal/sync/run-all/status" || true)
            if [ -z "$STATUS" ]; then
              echo "status poll failed or timed out; retrying"
              continue
            fi
            echo "$STATUS"

            IN_PROG=$(echo "$STATUS" | jq -r '.in_progress')
            if [ "$IN_PROG" = "true" ]; then
              continue
            fi

            # Run is no longer in progress — decide whether it actually finished.
            ERR=$(echo "$STATUS" | jq -r '.error // empty')
            if [ -n "$ERR" ]; then
              echo "::error::Sync failed: $ERR"
              exit 1
            fi

            FINISHED_AT=$(echo "$STATUS" | jq -r '.finished_at // empty')
            TOTAL=$(echo "$STATUS" | jq -r '.total_users')
            DONE=$(echo "$STATUS" | jq -r '.synced + .failed')

            if [ -n "$FINISHED_AT" ] && [ "$DONE" -ge "$TOTAL" ]; then
              echo "Sync complete: $DONE of $TOTAL users processed."
              exit 0
            fi

            # Incomplete or reset state: finished_at is empty, so the server
            # very likely restarted mid-run. Re-kick if we still have budget,
            # otherwise fail loudly.
            echo "::warning::Run not complete (finished_at='${FINISHED_AT}' done=${DONE} total=${TOTAL}) — likely mid-run server restart; re-kicking (attempt ${KICKS}/${MAX_KICKS})"
            if [ "$KICKS" -ge "$MAX_KICKS" ]; then
              echo "::error::Run did not complete after ${KICKS} attempts (last seen ${DONE} of ${TOTAL})"
              exit 1
            fi
            kick
          done

          echo "::error::Deadline reached before observing a complete run"
          exit 1

  # Memory headroom alert. The OOM that forced the 256->512 MB bump is a python3
  # GPX-download anonymous-memory spike (peaked ~413 MB on the 459 MB-usable VM;
  # see the nightly-sync-oom-debug note + fly.toml comment). The Go process never
  # shows it (process_resident_memory_bytes is Go-only) — it lives at the cgroup
  # level as fly_instance_memory_inactive. This job reads Fly Prometheus after the
  # run and goes red (GitHub emails on failure) if an OOM recurred or headroom got
  # critically low, so a creeping regression is caught before it abandons users.
  #
  # Auth: Fly's Prometheus needs an ORG-read token sent with the `FlyV1` scheme
  # (NOT `Bearer`). Set repo secret FLY_METRICS_TOKEN to `fly tokens create
  # readonly -o personal` output; it falls back to FLY_API_TOKEN. If the query
  # can't authenticate or returns no data, the job WARNS and passes — monitoring
  # gaps must never cry wolf or block the sync.
  headroom-alert:
    runs-on: ubuntu-latest
    needs: sync
    if: always()
    steps:
      - name: Check memory headroom over the run window
        env:
          TOKEN: ${{ secrets.FLY_METRICS_TOKEN || secrets.FLY_API_TOKEN }}
        run: |
          # GitHub runs run-steps with `bash -eo pipefail`, so `-e` is on by
          # default. Turn it OFF here: a failing Prometheus curl (401, timeout,
          # transient 5xx) must NOT abort the step — that would fail the workflow
          # with no ::error:: and email a false alarm, inverting the "never cry
          # wolf" contract below. Real alerts are raised explicitly via `exit 1`.
          set +e
          set -uo pipefail

          if [ -z "${TOKEN:-}" ]; then
            echo "::warning::No Fly token available for Prometheus; skipping headroom check"
            exit 0
          fi
          # Accept tokens stored with or without the leading "FlyV1 " scheme.
          TOKEN="${TOKEN#FlyV1 }"

          PB="https://api.fly.io/prometheus/personal/api/v1/query"
          APP='app="efb-connector"'
          # [4h] covers the full possible run (180 min cap + re-kicks) plus margin.
          q() {
            curl -fsS --max-time 30 -G "$PB" \
              -H "Authorization: FlyV1 $TOKEN" \
              --data-urlencode "query=$1" 2>/dev/null
          }
          scalar() {
            # Echo the single scalar value of an instant query, or empty on any
            # error / no-data so the caller can treat it as "unknown".
            echo "$1" | jq -r 'if .status=="success" and (.data.result|length)>0
                                then .data.result[0].value[1] else empty end' 2>/dev/null
          }

          OOM_RAW=$(q "max_over_time(fly_instance_exit_oom{$APP}[4h])")
          AVAIL_RAW=$(q "min_over_time(fly_instance_memory_mem_available{$APP}[4h])")
          ANON_RAW=$(q "max_over_time(fly_instance_memory_inactive{$APP}[4h])")

          OOM=$(scalar "$OOM_RAW")
          AVAIL=$(scalar "$AVAIL_RAW")
          ANON=$(scalar "$ANON_RAW")

          if [ -z "$AVAIL" ] && [ -z "$OOM" ]; then
            echo "::warning::Could not read Fly Prometheus (auth/scope or no data) — headroom unverified. Ensure FLY_METRICS_TOKEN is an org readonly token."
            exit 0
          fi

          AVAIL_MB=$(awk -v b="${AVAIL:-0}" 'BEGIN{printf "%d", b/1048576}')
          ANON_MB=$(awk  -v b="${ANON:-0}"  'BEGIN{printf "%d", b/1048576}')
          echo "Run window: min mem_available=${AVAIL_MB} MiB, peak inactive-anon=${ANON_MB} MiB, exit_oom=${OOM:-0}"

          # Hard alert: an actual OOM kill, or availability dipped below 32 MiB
          # (the machine was about to die).
          if [ "${OOM:-0}" != "0" ] && [ -n "${OOM:-}" ]; then
            echo "::error::OOM kill detected during the run (fly_instance_exit_oom=${OOM}). The python GPX spike exceeded the VM. Bound the subprocess RAM or raise memory."
            exit 1
          fi
          if [ -n "$AVAIL" ] && [ "$AVAIL_MB" -lt 32 ]; then
            echo "::error::Memory headroom critical: min available ${AVAIL_MB} MiB (<32). An OOM is imminent — bound the python GPX download or raise the VM."
            exit 1
          fi
          # Soft warning: headroom thinning toward the known ~413 MiB python peak.
          if [ -n "$AVAIL" ] && [ "$AVAIL_MB" -lt 80 ]; then
            echo "::warning::Memory headroom low: min available ${AVAIL_MB} MiB (peak python anon ${ANON_MB} MiB). Approaching the OOM threshold; consider bounding the GPX download."
          fi
          echo "Headroom OK."
