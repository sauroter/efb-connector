name: CD

on:
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - run: go mod download
      - run: go vet ./...
      - run: go test ./...

  deploy:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Sync Resend infrastructure
        run: ./infrastructure/resend-setup.sh
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only --build-arg VERSION=${{ github.event.release.tag_name }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Health check after deploy
        continue-on-error: true
        run: |
          sleep 10
          curl --fail --retry 3 --retry-delay 5 ${{ secrets.BASE_URL }}/health
