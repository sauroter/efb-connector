name: CD

on:
  release:
    types: [published]

jobs:
  quality:
    uses: ./.github/workflows/_quality.yml
    with:
      ref: ${{ github.event.release.tag_name }}

  deploy:
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Sync Resend infrastructure
        run: ./infrastructure/resend-setup.sh
        env:
          RESEND_MANAGEMENT_KEY: ${{ secrets.RESEND_MANAGEMENT_KEY }}
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only --build-arg VERSION=${{ github.event.release.tag_name }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Health check after deploy
        run: |
          sleep 10
          curl --fail --retry 3 --retry-delay 5 ${{ secrets.BASE_URL }}/health
