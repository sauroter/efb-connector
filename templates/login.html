{{define "login.html"}}<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in — EFB Connector</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <style>
    .auth-card { max-width: 420px; margin: 4rem auto; }
    .flash-message { padding: 1rem; margin-bottom: 1rem; border-radius: var(--pico-border-radius); background: var(--pico-del-color, #fdecea); border: 1px solid var(--pico-muted-border-color); }
  </style>
</head>
<body>
  <nav class="container">
    <ul><li><a href="/"><strong>EFB Connector</strong></a></li></ul>
  </nav>

  <main class="container">
    <article class="auth-card">
      <hgroup>
        <h1>Sign in</h1>
        <p>We'll send you a magic link — no password needed.</p>
      </hgroup>

      {{if .Flash}}
      <div role="alert" class="flash-message">{{.Flash}}</div>
      {{end}}

      <form method="POST" action="/login">
        <label for="email">Email address
          <input type="email" id="email" name="email" placeholder="you@example.com" required autofocus>
        </label>
        <button type="submit">Send login link</button>
      </form>
    </article>
  </main>

  <footer class="container" style="text-align: center; padding: 2rem 0; color: var(--pico-muted-color);">
    <small>&copy; 2025 EFB Connector</small>
  </footer>
</body>
</html>{{end}}
