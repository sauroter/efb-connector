{{define "login.html"}}<!DOCTYPE html>
<html lang="{{.Lang}}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <title>{{call .T "login.title"}}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="/static/styles.css">
  <style>
    .auth-card { max-width: 420px; margin: 4rem auto; }
  </style>
</head>
<body>
  <nav class="container">
    <ul><li><a href="/" style="display: inline-flex; align-items: center; gap: 0.4rem;"><img src="/static/favicon.svg" alt="" width="24" height="24"><strong>{{call .T "nav.brand"}}</strong></a></li></ul>
  </nav>

  <main class="container">
    <article class="auth-card">
      <hgroup>
        <h1>{{call .T "login.heading"}}</h1>
        <p>{{call .T "login.subtitle"}}</p>
      </hgroup>

      {{if .Flash}}
      <div role="alert" class="flash-message">{{.Flash}}</div>
      {{end}}

      <form method="POST" action="/login">
        <label for="email">{{call .T "login.email_label"}}
          <input type="email" id="email" name="email" placeholder="{{call .T "login.email_placeholder"}}" required autofocus>
        </label>
        <button type="submit">{{call .T "login.submit"}}</button>
      </form>
    </article>
  </main>

  {{template "footer" .}}
</body>
</html>{{end}}
