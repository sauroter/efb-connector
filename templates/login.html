{{define "login.html"}}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <title>Sign in — EFB Connector</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="/static/styles.css">
  <style>
    .auth-card { max-width: 420px; margin: 4rem auto; }
  </style>
</head>
<body>
  <nav class="container">
    <ul><li><a href="/" style="display: inline-flex; align-items: center; gap: 0.4rem;"><img src="/static/favicon.svg" alt="" width="24" height="24"><strong>EFB Connector</strong></a></li></ul>
  </nav>

  <main class="container">
    <article class="auth-card">
      <hgroup>
        <h1>Sign in</h1>
        <p>We'll send you a magic link — no password needed.</p>
      </hgroup>

      {{if .Flash}}
      <div role="alert" class="flash-message">{{.Flash}}</div>
      {{end}}

      <form method="POST" action="/login">
        <label for="email">Email address
          <input type="email" id="email" name="email" placeholder="you@example.com" required autofocus>
        </label>
        <button type="submit">Send login link</button>
      </form>
    </article>
  </main>

  <footer class="container" style="text-align: center; padding: 2rem 0; color: var(--pico-muted-color);">
    <small>&copy; 2025 EFB Connector &middot; <a href="/impressum">Impressum</a> &middot; <a href="/privacy">Datenschutz</a> &middot; <a href="https://github.com/sauroter/efb-connector">GitHub</a></small>
  </footer>
</body>
</html>{{end}}
