{{define "settings_efb.html"}}<!DOCTYPE html>
<html><head><title>EFB Settings - EFB Connector</title></head>
<body>
<h1>EFB Settings</h1>
{{if .Flash}}<p>{{.Flash}}</p>{{end}}
{{if .Connected}}
<p>Connected as: {{.Username}}</p>
<form method="POST" action="/settings/efb/delete">
  <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
  <button type="submit">Disconnect</button>
</form>
{{end}}
<h2>{{if .Connected}}Update{{else}}Connect{{end}} EFB</h2>
<form method="POST" action="/settings/efb">
  <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
  <label>Username: <input type="text" name="username" required></label><br>
  <label>Password: <input type="password" name="password" required></label><br>
  <button type="submit">Save</button>
</form>
<p><a href="/dashboard">Back to Dashboard</a></p>
</body>
</html>{{end}}
